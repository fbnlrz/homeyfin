<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="root" class="card loading">
    <header class="card-header">
      <div class="title-block">
        <span class="brand-dot"></span>
        <div>
          <div class="server-name" id="server-name">—</div>
          <div class="server-sub" id="server-sub">connecting…</div>
        </div>
      </div>
      <div class="status" id="status">
        <span class="dot offline"></span>
        <span id="status-text">offline</span>
      </div>
    </header>

    <section class="stats">
      <div class="stat" data-key="active">
        <div class="stat-value" id="stat-active">0</div>
        <div class="stat-label">streams</div>
      </div>
      <div class="stat" data-key="movies">
        <div class="stat-value" id="stat-movies">0</div>
        <div class="stat-label">movies</div>
      </div>
      <div class="stat" data-key="series">
        <div class="stat-value" id="stat-series">0</div>
        <div class="stat-label">series</div>
      </div>
      <div class="stat" data-key="episodes">
        <div class="stat-value" id="stat-episodes">0</div>
        <div class="stat-label">episodes</div>
      </div>
    </section>

    <div class="split" id="split"></div>

    <section class="streams" id="streams">
      <div class="empty" id="empty">No active streams</div>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
