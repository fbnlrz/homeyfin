<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="root" class="card empty">
    <div id="empty-msg" class="empty-msg">Nothing playing</div>

    <div id="stream" class="stream" style="display:none;">
      <div class="poster" id="poster"></div>
      <div class="info">
        <div class="title" id="title">—</div>
        <div class="sub"   id="sub">—</div>
        <div class="meta"  id="meta">—</div>
        <div class="progress"><span id="bar"></span></div>
        <div class="times">
          <span id="time-now">0:00</span>
          <span id="time-tot">0:00</span>
        </div>
        <button id="toggle" class="play">⏯</button>
      </div>
    </div>
  </div>
  <script src="./script.js"></script>
</body>
</html>
