<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body>
  <header class="homey-header">
    <h1 class="homey-title">Choose Jellyfin user</h1>
    <p class="homey-subtitle">A device represents a user. Playback control affects whichever client this user is active on.</p>
  </header>

  <fieldset class="homey-form-fieldset">
    <div class="homey-form-group">
      <label class="homey-form-label" for="userSelect">User</label>
      <select class="homey-form-select" id="userSelect"></select>
    </div>

    <div id="error" style="color:#c00;margin-top:8px;font-size:12px;white-space:pre-wrap;"></div>
    <div id="info"  style="color:#06c;margin-top:8px;font-size:12px;"></div>
  </fieldset>

  <button id="add" class="homey-button-primary-full">Add user</button>

  <script type="application/javascript">
    const $err = document.getElementById('error');
    const $info = document.getElementById('info');
    const $btn = document.getElementById('add');
    const $sel = document.getElementById('userSelect');

    (async () => {
      try {
        const users = await Homey.emit('fetch_users');
        if (!users || users.length === 0) throw new Error('No users found on server.');
        for (const u of users) {
          const opt = document.createElement('option');
          opt.value = u.Id;
          const tags = [];
          if (u.IsAdministrator) tags.push('admin');
          if (u.alreadyPaired) tags.push('already added');
          opt.textContent = u.Name + (tags.length ? ' (' + tags.join(', ') + ')' : '');
          if (u.alreadyPaired) opt.disabled = true;
          $sel.appendChild(opt);
        }
      } catch (e) {
        $err.textContent = (e && (e.message || e.toString())) || String(e);
        $btn.disabled = true;
      }
    })();

    $btn.addEventListener('click', async () => {
      $err.textContent = '';
      $info.textContent = '';
      $btn.disabled = true;
      try {
        const userId = $sel.value;
        if (!userId) throw new Error('Pick a user');
        const device = await Homey.emit('add_user', { userId });
        if (!device) throw new Error('Driver returned no device');
        $info.textContent = 'Creating device…';
        await Homey.createDevice(device);
        await Homey.done();
      } catch (e) {
        $info.textContent = '';
        $err.textContent = (e && (e.message || e.toString())) || 'Unknown error';
        $btn.disabled = false;
      }
    });
  </script>
</body>
</html>
