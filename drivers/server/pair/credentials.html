<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
</head>
<body>
  <header class="homey-header">
    <h1 class="homey-title">Connect to Jellyfin</h1>
    <p class="homey-subtitle">Enter your server URL and API key.</p>
  </header>

  <fieldset class="homey-form-fieldset">
    <div class="homey-form-group">
      <label class="homey-form-label" for="baseUrl">Server URL</label>
      <input class="homey-form-input" id="baseUrl" type="url"
             placeholder="http://192.168.1.10:8096" autocomplete="off" />
      <p class="homey-form-helper-text">Include scheme and port, e.g. http://host:8096</p>
    </div>

    <div class="homey-form-group">
      <label class="homey-form-label" for="apiKey">API Key</label>
      <input class="homey-form-input" id="apiKey" type="password" autocomplete="off" />
      <p class="homey-form-helper-text">Jellyfin: Dashboard → API Keys → New</p>
    </div>

    <div class="homey-form-group">
      <label class="homey-form-label" for="userName">Default user (optional)</label>
      <input class="homey-form-input" id="userName" type="text" autocomplete="off" />
      <p class="homey-form-helper-text">Used for "latest items" lookup. Leave empty for first user.</p>
    </div>

    <div id="error" style="color:#c00;margin-top:8px;white-space:pre-wrap;font-size:12px;"></div>
    <div id="info"  style="color:#06c;margin-top:8px;font-size:12px;"></div>
  </fieldset>

  <button id="connect" class="homey-button-primary-full">Connect</button>

  <script type="application/javascript">
    const $err = document.getElementById('error');
    const $info = document.getElementById('info');
    const $btn = document.getElementById('connect');

    function isRepair() {
      try { return typeof Homey.createDevice !== 'function'; } catch { return true; }
    }

    $btn.addEventListener('click', async () => {
      $err.textContent = '';
      $info.textContent = '';
      $btn.disabled = true;

      const baseUrl = document.getElementById('baseUrl').value.trim();
      const apiKey  = document.getElementById('apiKey').value.trim();
      const userName = document.getElementById('userName').value.trim();

      if (!baseUrl || !apiKey) {
        $err.textContent = 'URL and API key are required.';
        $btn.disabled = false;
        return;
      }

      try {
        $info.textContent = 'Testing connection…';
        const device = await Homey.emit('verify', { baseUrl, apiKey, userName });
        if (!device) throw new Error('Verify returned no device');

        if (isRepair()) {
          $info.textContent = 'Connection OK. Closing…';
          await Homey.done();
          return;
        }

        $info.textContent = 'Creating device…';
        await Homey.createDevice(device);
        await Homey.done();
      } catch (e) {
        $info.textContent = '';
        const msg = (e && (e.message || e.toString())) || 'Unknown error';
        $err.textContent = msg;
        $btn.disabled = false;
      }
    });
  </script>
</body>
</html>
