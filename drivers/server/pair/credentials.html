<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
</head>
<body>
  <header class="homey-header">
    <h1 class="homey-title">Connect to Jellyfin</h1>
    <p class="homey-subtitle">Enter your server URL and API key.</p>
  </header>

  <fieldset class="homey-form-fieldset">
    <div class="homey-form-group">
      <label class="homey-form-label" for="baseUrl">Server URL</label>
      <input class="homey-form-input" id="baseUrl" type="url"
             placeholder="http://192.168.1.10:8096" autocomplete="off" />
      <p class="homey-form-helper-text">Include scheme and port, e.g. http://host:8096</p>
    </div>

    <div class="homey-form-group">
      <label class="homey-form-label" for="apiKey">API Key</label>
      <input class="homey-form-input" id="apiKey" type="password" autocomplete="off" />
      <p class="homey-form-helper-text">Jellyfin: Dashboard → API Keys → New</p>
    </div>

    <div id="user-group" class="homey-form-group" style="display:none;">
      <label class="homey-form-label" for="userSelect">Default user</label>
      <select class="homey-form-select" id="userSelect"></select>
      <p class="homey-form-helper-text">Library counts and "latest items" come from this user.</p>
    </div>

    <div id="error" style="color:#c00;margin-top:8px;white-space:pre-wrap;font-size:12px;"></div>
    <div id="info"  style="color:#06c;margin-top:8px;font-size:12px;"></div>
  </fieldset>

  <button id="action" class="homey-button-primary-full">Test connection</button>

  <script type="application/javascript">
    const $err = document.getElementById('error');
    const $info = document.getElementById('info');
    const $btn = document.getElementById('action');
    const $sel = document.getElementById('userSelect');
    const $userGroup = document.getElementById('user-group');

    let users = null;
    let creds = null;

    function isRepair() {
      try { return typeof Homey.createDevice !== 'function'; } catch { return true; }
    }

    async function test() {
      $err.textContent = '';
      $info.textContent = '';
      $btn.disabled = true;

      const baseUrl = document.getElementById('baseUrl').value.trim();
      const apiKey  = document.getElementById('apiKey').value.trim();
      if (!baseUrl || !apiKey) {
        $err.textContent = 'URL and API key are required.';
        $btn.disabled = false;
        return;
      }

      try {
        $info.textContent = 'Testing connection…';
        const result = await Homey.emit('verify_connection', { baseUrl, apiKey });
        if (!result || !Array.isArray(result.users)) {
          throw new Error('Verify returned no users: ' + JSON.stringify(result));
        }
        users = result.users;
        creds = { baseUrl, apiKey };

        $sel.innerHTML = '';
        for (const u of users) {
          const opt = document.createElement('option');
          opt.value = u.Id;
          opt.textContent = u.Name + (u.IsAdministrator ? ' (admin)' : '');
          $sel.appendChild(opt);
        }
        $userGroup.style.display = '';
        $info.textContent = 'Connected to ' + result.server + ' — pick a default user.';
        $btn.textContent = 'Add device';
        $btn.disabled = false;
      } catch (e) {
        $info.textContent = '';
        $err.textContent = (e && (e.message || e.toString())) || 'Unknown error';
        $btn.disabled = false;
      }
    }

    async function finalize() {
      $err.textContent = '';
      $info.textContent = '';
      $btn.disabled = true;
      try {
        const userId = $sel.value;
        if (!userId) throw new Error('Pick a user');
        const device = await Homey.emit('finalize', {
          baseUrl: creds.baseUrl,
          apiKey: creds.apiKey,
          userId,
        });
        if (!device) throw new Error('Finalize returned no device');

        if (isRepair()) {
          $info.textContent = 'Saved. Closing…';
          await Homey.done();
          return;
        }
        $info.textContent = 'Creating device…';
        await Homey.createDevice(device);
        await Homey.done();
      } catch (e) {
        $info.textContent = '';
        $err.textContent = (e && (e.message || e.toString())) || 'Unknown error';
        $btn.disabled = false;
      }
    }

    $btn.addEventListener('click', () => {
      if (users === null) test();
      else finalize();
    });
  </script>
</body>
</html>
