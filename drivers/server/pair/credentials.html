<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
</head>
<body>
  <header class="homey-header">
    <h1 class="homey-title" data-i18n="pair.credentials.title">Connect to Jellyfin</h1>
    <p class="homey-subtitle" data-i18n="pair.credentials.subtitle">Enter your server URL and API key.</p>
  </header>

  <fieldset class="homey-form-fieldset">
    <div class="homey-form-group">
      <label class="homey-form-label" for="baseUrl">Server URL</label>
      <input class="homey-form-input" id="baseUrl" type="url"
             placeholder="http://192.168.1.10:8096" autocomplete="off" />
      <p class="homey-form-helper-text">Include scheme and port, e.g. http://host:8096</p>
    </div>

    <div class="homey-form-group">
      <label class="homey-form-label" for="apiKey">API Key</label>
      <input class="homey-form-input" id="apiKey" type="password" autocomplete="off" />
      <p class="homey-form-helper-text">Jellyfin: Dashboard → API Keys → New</p>
    </div>

    <div class="homey-form-group">
      <label class="homey-form-label" for="userName">Default user (optional)</label>
      <input class="homey-form-input" id="userName" type="text" autocomplete="off" />
      <p class="homey-form-helper-text">Used for "latest items" lookup. Leave empty for first admin user.</p>
    </div>

    <div id="error" class="homey-form-error" style="color:#c00;margin-top:8px;"></div>
  </fieldset>

  <button id="connect" class="homey-button-primary-full">Connect</button>

  <script type="application/javascript">
    document.getElementById('connect').addEventListener('click', async () => {
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const apiKey  = document.getElementById('apiKey').value.trim();
      const userName = document.getElementById('userName').value.trim();
      const err = document.getElementById('error');
      err.textContent = '';

      if (!baseUrl || !apiKey) {
        err.textContent = 'URL and API key are required.';
        return;
      }
      try {
        const device = await Homey.emit('verify', { baseUrl, apiKey, userName });
        Homey.emit('list_device', device);
        Homey.nextView();
      } catch (e) {
        err.textContent = e && e.message ? e.message : String(e);
      }
    });
  </script>
</body>
</html>
