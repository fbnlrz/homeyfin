<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body>
  <header class="homey-header">
    <h1 class="homey-title">Choose default user</h1>
    <p class="homey-subtitle">This user's library counts and "latest items" are reported on the server device.</p>
  </header>

  <fieldset class="homey-form-fieldset">
    <div class="homey-form-group">
      <label class="homey-form-label" for="userSelect">User</label>
      <select class="homey-form-select" id="userSelect"></select>
    </div>

    <div id="error" style="color:#c00;margin-top:8px;font-size:12px;white-space:pre-wrap;"></div>
    <div id="info"  style="color:#06c;margin-top:8px;font-size:12px;"></div>
  </fieldset>

  <button id="finish" class="homey-button-primary-full">Add device</button>

  <script type="application/javascript">
    const $err = document.getElementById('error');
    const $info = document.getElementById('info');
    const $btn = document.getElementById('finish');
    const $sel = document.getElementById('userSelect');

    function isRepair() {
      try { return typeof Homey.createDevice !== 'function'; } catch { return true; }
    }

    (async () => {
      try {
        const users = await Homey.emit('list_users');
        if (!users || users.length === 0) throw new Error('No users found on server.');
        for (const u of users) {
          const opt = document.createElement('option');
          opt.value = u.Id;
          opt.textContent = u.Name + (u.IsAdministrator ? ' (admin)' : '');
          $sel.appendChild(opt);
        }
      } catch (e) {
        $err.textContent = (e && (e.message || e.toString())) || String(e);
        $btn.disabled = true;
      }
    })();

    $btn.addEventListener('click', async () => {
      $err.textContent = '';
      $info.textContent = '';
      $btn.disabled = true;
      try {
        const userId = $sel.value;
        const device = await Homey.emit('finalize', { userId });
        if (!device) throw new Error('Finalize returned no device.');

        if (isRepair()) {
          $info.textContent = 'Saved. Closing…';
          await Homey.done();
          return;
        }
        $info.textContent = 'Creating device…';
        await Homey.createDevice(device);
        await Homey.done();
      } catch (e) {
        $info.textContent = '';
        $err.textContent = (e && (e.message || e.toString())) || 'Unknown error';
        $btn.disabled = false;
      }
    });
  </script>
</body>
</html>
